camera:
  source: ${CAMERA_URL}
  width: 640
  height: 480
  fps: 10

detection:
  # Set backend to "hailo" to use AI Hat, or "yolo" for CPU inference
  backend: yolo
  model_path: models/vehicle/vehicle_detect_model.pt
  # HEF model for Hailo (export with: yolo export model=vehicle_detect_model.pt format=hailo)
  hailo_model_path: models/vehicle/vehicle_detect_model.hef
  confidence: 0.5
  classes: [2,5,7]
  imgsz: 416
  process_every_n: 1

plate_detection:
  backend: yolo
  model_path: models/plates/plate_detect_model.pt
  hailo_model_path: models/plates/plate_detect_model.hef
  confidence: 0.3

tracking:
  config: config/bytetrack.yaml
  max_age: 30 

spaces:
  config: config/parking_spaces.json

alerts:
  enabled: true
  cooldown_seconds: 30
  email: ${ALERT_EMAIL}

entry_camera:
  source: ${ENTRY_CAMERA_URL}
  width: 640
  height: 480
  fps: 5

lpr:
  # Set backend to "hailo" for NPU, or omit for ONNX CPU
  backend: onnx
  model_path: models/lpr/lprnet.onnx
  hailo_model_path: models/lpr/lprnet.hef

plate_reader:
  # Fallback API — only used if no LPR model is configured
  api_url: ${PLATE_READER_API}
  poll_interval: 1

entry_zone:
  polygon: [[0, 600], [200, 600], [200, 720], [0, 720]]


